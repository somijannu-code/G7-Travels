<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#f8fafc" rx="12"/>
  <!-- Car Body -->
  <path d="M50 140 L75 90 L150 80 L280 80 L310 90 L350 140 L350 150 L50 150 Z" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
  <!-- Windows -->
  <path d="M80 100 L145 90 L265 90 L305 100 L295 125 L90 125 Z" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Wheel Wells -->
  <circle cx="105" cy="150" r="28" fill="#1e293b"/>
  <circle cx="295" cy="150" r="28" fill="#1e293b"/>
  <!-- Wheels -->
  <circle cx="105" cy="150" r="22" fill="#475569"/>
  <circle cx="105" cy="150" r="9" fill="#94a3b8"/>
  <circle cx="295" cy="150" r="22" fill="#475569"/>
  <circle cx="295" cy="150" r="9" fill="#94a3b8"/>
  <!-- Headlight -->
  <ellipse cx="335" cy="128" rx="9" ry="6" fill="#fef08a"/>
  <!-- Taillight -->
  <ellipse cx="65" cy="128" rx="7" ry="5" fill="#fca5a5"/>
  <!-- Door Line -->
  <line x1="200" y1="90" x2="200" y2="145" stroke="#16a34a" stroke-width="2"/>
  <!-- Door Handle -->
  <rect x="165" y="115" width="18" height="3" rx="1" fill="#16a34a"/>
  <rect x="217" y="115" width="18" height="3" rx="1" fill="#16a34a"/>
  <!-- Grille -->
  <rect x="320" y="135" width="20" height="8" rx="2" fill="#1e293b"/>
  <line x1="322" y1="139" x2="338" y2="139" stroke="#475569" stroke-width="1"/>
</svg>
