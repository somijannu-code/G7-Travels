<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#f8fafc" rx="12"/>
  <!-- Bus Body -->
  <path d="M25 160 L50 65 L130 45 L290 45 L330 65 L375 160 L375 172 L25 172 Z" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
  <!-- Roof -->
  <rect x="70" y="35" width="260" height="15" rx="3" fill="#22d3ee" stroke="#0891b2" stroke-width="2"/>
  <!-- Windows Row 1 -->
  <rect x="55" y="68" width="70" height="40" rx="3" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="130" y="68" width="70" height="40" rx="3" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="205" y="68" width="70" height="40" rx="3" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="280" y="68" width="70" height="40" rx="3" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Windows Row 2 -->
  <rect x="55" y="112" width="70" height="35" rx="3" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="130" y="112" width="70" height="35" rx="3" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="205" y="112" width="70" height="35" rx="3" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="280" y="112" width="70" height="35" rx="3" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Window Dividers -->
  <line x1="125" y1="68" x2="125" y2="147" stroke="#0891b2" stroke-width="2"/>
  <line x1="200" y1="68" x2="200" y2="147" stroke="#0891b2" stroke-width="2"/>
  <line x1="275" y1="68" x2="275" y2="147" stroke="#0891b2" stroke-width="2"/>
  <line x1="55" y1="108" x2="350" y2="108" stroke="#0891b2" stroke-width="2"/>
  <!-- Wheel Wells -->
  <circle cx="85" cy="172" r="38" fill="#1e293b"/>
  <circle cx="200" cy="172" r="38" fill="#1e293b"/>
  <circle cx="315" cy="172" r="38" fill="#1e293b"/>
  <!-- Wheels -->
  <circle cx="85" cy="172" r="30" fill="#475569"/>
  <circle cx="85" cy="172" r="14" fill="#94a3b8"/>
  <circle cx="200" cy="172" r="30" fill="#475569"/>
  <circle cx="200" cy="172" r="14" fill="#94a3b8"/>
  <circle cx="315" cy="172" r="30" fill="#475569"/>
  <circle cx="315" cy="172" r="14" fill="#94a3b8"/>
  <!-- Headlight -->
  <ellipse cx="360" cy="115" rx="14" ry="9" fill="#fef08a"/>
  <!-- Taillight -->
  <ellipse cx="40" cy="115" rx="12" ry="8" fill="#fca5a5"/>
  <!-- Door Lines -->
  <line x1="125" y1="50" x2="125" y2="160" stroke="#0891b2" stroke-width="2"/>
  <line x1="200" y1="50" x2="200" y2="160" stroke="#0891b2" stroke-width="2"/>
  <line x1="275" y1="50" x2="275" y2="160" stroke="#0891b2" stroke-width="2"/>
  <!-- Door Handles -->
  <rect x="95" y="90" width="18" height="4" rx="1" fill="#0891b2"/>
  <rect x="170" y="90" width="18" height="4" rx="1" fill="#0891b2"/>
  <rect x="245" y="90" width="18" height="4" rx="1" fill="#0891b2"/>
  <rect x="320" y="90" width="18" height="4" rx="1" fill="#0891b2"/>
  <!-- Grille -->
  <rect x="343" y="152" width="28" height="14" rx="2" fill="#1e293b"/>
  <line x1="345" y1="159" x2="369" y2="159" stroke="#475569" stroke-width="1"/>
  <!-- Side Mirror -->
  <ellipse cx="52" cy="80" rx="7" ry="5" fill="#22d3ee" stroke="#0891b2" stroke-width="1.5"/>
  <!-- Destination Sign -->
  <rect x="120" y="48" width="160" height="10" rx="2" fill="#fef08a" stroke="#fbbf24" stroke-width="1"/>
  <text x="200" y="56" text-anchor="middle" font-size="6" fill="#1e293b" font-weight="bold">G7 TRAVELS</text>
</svg>
