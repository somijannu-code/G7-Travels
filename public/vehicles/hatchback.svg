<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="#f8fafc" rx="12"/>
  <!-- Car Body -->
  <path d="M60 140 L80 100 L150 90 L280 90 L320 100 L340 140 L340 150 L60 150 Z" fill="#f97316" stroke="#ea580c" stroke-width="2"/>
  <!-- Windows -->
  <path d="M85 105 L140 98 L270 98 L305 105 L295 125 L95 125 Z" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Wheel Wells -->
  <circle cx="110" cy="150" r="25" fill="#1e293b"/>
  <circle cx="290" cy="150" r="25" fill="#1e293b"/>
  <!-- Wheels -->
  <circle cx="110" cy="150" r="20" fill="#475569"/>
  <circle cx="110" cy="150" r="8" fill="#94a3b8"/>
  <circle cx="290" cy="150" r="20" fill="#475569"/>
  <circle cx="290" cy="150" r="8" fill="#94a3b8"/>
  <!-- Headlight -->
  <ellipse cx="325" cy="130" rx="8" ry="5" fill="#fef08a"/>
  <!-- Taillight -->
  <ellipse cx="75" cy="130" rx="6" ry="4" fill="#fca5a5"/>
  <!-- Door Line -->
  <line x1="200" y1="100" x2="200" y2="145" stroke="#ea580c" stroke-width="2"/>
  <!-- Door Handle -->
  <rect x="170" y="118" width="15" height="3" rx="1" fill="#ea580c"/>
  <rect x="215" y="118" width="15" height="3" rx="1" fill="#ea580c"/>
</svg>
